<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 760" font-family="Consolas,Menlo,monospace">
  <defs>
    <g id="gnd" stroke="#111" stroke-width="1.6" fill="none">
      <line x1="0" y1="0" x2="0" y2="9"/>
      <line x1="-8" y1="9" x2="8" y2="9"/>
      <line x1="-5" y1="13" x2="5" y2="13"/>
      <line x1="-2" y1="17" x2="2" y2="17"/>
    </g>
    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="2.6" fill="#1a7f37"/>
    </marker>
  </defs>

  <!-- sheet -->
  <rect x="0" y="0" width="1140" height="760" fill="#fbfbf7"/>
  <rect x="8" y="8" width="1124" height="744" fill="none" stroke="#111" stroke-width="1"/>
  <text x="20" y="34" font-size="19" font-weight="bold" fill="#111">NauticSense Link — ESP32 ↔ NMEA 2000 (SN65HVD230) + NMEA 0183 (MAX490 RS-422 full duplex)</text>
  <text x="20" y="54" font-size="12" fill="#555">Pins per esp32_nauticsense_link/config.h · KiCad-style schematic · see README.md / .kicad_sch</text>

  <!-- ===================== ESP32 ===================== -->
  <rect x="80" y="170" width="210" height="430" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="185" y="195" font-size="15" font-weight="bold" text-anchor="middle" fill="#111">ESP32 DevKit</text>
  <text x="185" y="212" font-size="11" text-anchor="middle" fill="#777">(ESP32-D0WD-V3)</text>

  <!-- ESP32 left pins (power) -->
  <line x1="56" y1="240" x2="80" y2="240" stroke="#111" stroke-width="1.6"/>
  <text x="86" y="244" font-size="12" fill="#111">3V3</text>
  <text x="52" y="244" font-size="12" font-weight="bold" text-anchor="end" fill="#cc1111">3V3</text>

  <line x1="56" y1="280" x2="80" y2="280" stroke="#111" stroke-width="1.6"/>
  <text x="86" y="284" font-size="12" fill="#111">5V</text>
  <text x="52" y="284" font-size="12" font-weight="bold" text-anchor="end" fill="#e07b00">+5V</text>

  <line x1="56" y1="560" x2="80" y2="560" stroke="#111" stroke-width="1.6"/>
  <text x="86" y="564" font-size="12" fill="#111">GND</text>
  <use href="#gnd" x="56" y="560"/>

  <!-- ESP32 right pins (signals) -->
  <line x1="290" y1="300" x2="314" y2="300" stroke="#111" stroke-width="1.6"/>
  <text x="284" y="304" font-size="12" text-anchor="end" fill="#111">GPIO5</text>
  <line x1="290" y1="340" x2="314" y2="340" stroke="#111" stroke-width="1.6"/>
  <text x="284" y="344" font-size="12" text-anchor="end" fill="#111">GPIO4</text>
  <line x1="290" y1="430" x2="314" y2="430" stroke="#111" stroke-width="1.6"/>
  <text x="284" y="434" font-size="12" text-anchor="end" fill="#111">GPIO17</text>
  <line x1="290" y1="470" x2="314" y2="470" stroke="#111" stroke-width="1.6"/>
  <text x="284" y="474" font-size="12" text-anchor="end" fill="#111">GPIO16</text>
  <text x="284" y="540" font-size="11" text-anchor="end" fill="#999">GPIO2 LED (onboard)</text>

  <!-- ===================== SN65HVD230 ===================== -->
  <rect x="560" y="170" width="230" height="165" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="675" y="195" font-size="14" font-weight="bold" text-anchor="middle" fill="#111">SN65HVD230 CAN</text>
  <text x="675" y="211" font-size="11" text-anchor="middle" fill="#777">Waveshare (3.3 V, 120 Ω, ESD)</text>

  <line x1="536" y1="240" x2="560" y2="240" stroke="#111" stroke-width="1.6"/>
  <text x="566" y="244" font-size="12" fill="#111">VCC</text>
  <text x="532" y="244" font-size="12" font-weight="bold" text-anchor="end" fill="#cc1111">3V3</text>

  <line x1="536" y1="275" x2="560" y2="275" stroke="#111" stroke-width="1.6"/>
  <text x="566" y="279" font-size="12" fill="#111">GND</text>
  <use href="#gnd" x="536" y="275"/>

  <line x1="536" y1="305" x2="560" y2="305" stroke="#111" stroke-width="1.6"/>
  <text x="566" y="309" font-size="12" fill="#111">CTX</text>
  <line x1="536" y1="325" x2="560" y2="325" stroke="#111" stroke-width="1.6"/>
  <text x="566" y="320" font-size="12" fill="#111">CRX</text>

  <line x1="790" y1="210" x2="814" y2="210" stroke="#111" stroke-width="1.6"/>
  <text x="784" y="214" font-size="12" text-anchor="end" fill="#111">CANH</text>
  <line x1="790" y1="250" x2="814" y2="250" stroke="#111" stroke-width="1.6"/>
  <text x="784" y="254" font-size="12" text-anchor="end" fill="#111">CANL</text>

  <!-- ===================== MAX490 ===================== -->
  <rect x="560" y="400" width="230" height="220" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="675" y="425" font-size="14" font-weight="bold" text-anchor="middle" fill="#111">MAX490 RS-422</text>
  <text x="675" y="441" font-size="11" text-anchor="middle" fill="#777">full duplex (no DE/RE)</text>

  <line x1="536" y1="465" x2="560" y2="465" stroke="#111" stroke-width="1.6"/>
  <text x="566" y="469" font-size="12" fill="#111">VCC</text>
  <text x="532" y="469" font-size="12" font-weight="bold" text-anchor="end" fill="#e07b00">+5V</text>

  <line x1="536" y1="495" x2="560" y2="495" stroke="#111" stroke-width="1.6"/>
  <text x="566" y="499" font-size="12" fill="#111">GND</text>
  <use href="#gnd" x="536" y="495"/>

  <line x1="536" y1="525" x2="560" y2="525" stroke="#111" stroke-width="1.6"/>
  <text x="566" y="529" font-size="12" fill="#111">DI</text>
  <line x1="536" y1="565" x2="560" y2="565" stroke="#111" stroke-width="1.6"/>
  <text x="566" y="569" font-size="12" fill="#111">RO</text>

  <line x1="790" y1="430" x2="814" y2="430" stroke="#111" stroke-width="1.6"/>
  <text x="784" y="434" font-size="12" text-anchor="end" fill="#111">Y (TX+)</text>
  <line x1="790" y1="463" x2="814" y2="463" stroke="#111" stroke-width="1.6"/>
  <text x="784" y="467" font-size="12" text-anchor="end" fill="#111">Z (TX−)</text>
  <line x1="790" y1="555" x2="814" y2="555" stroke="#111" stroke-width="1.6"/>
  <text x="784" y="559" font-size="12" text-anchor="end" fill="#111">A (RX+)</text>
  <line x1="790" y1="588" x2="814" y2="588" stroke="#111" stroke-width="1.6"/>
  <text x="784" y="592" font-size="12" text-anchor="end" fill="#111">B (RX−)</text>

  <!-- ===================== Connectors ===================== -->
  <rect x="960" y="180" width="140" height="110" rx="4" fill="#eef6ee" stroke="#111" stroke-width="2"/>
  <text x="1030" y="205" font-size="13" font-weight="bold" text-anchor="middle" fill="#111">NMEA 2000</text>
  <text x="1030" y="221" font-size="10" text-anchor="middle" fill="#777">backbone drop</text>
  <line x1="936" y1="210" x2="960" y2="210" stroke="#111" stroke-width="1.6"/>
  <text x="966" y="214" font-size="11" fill="#111">CAN_H</text>
  <line x1="936" y1="250" x2="960" y2="250" stroke="#111" stroke-width="1.6"/>
  <text x="966" y="254" font-size="11" fill="#111">CAN_L</text>
  <text x="966" y="280" font-size="10" fill="#999">shield → GND (no 12 V)</text>

  <rect x="960" y="405" width="140" height="215" rx="4" fill="#eef6ee" stroke="#111" stroke-width="2"/>
  <text x="1030" y="428" font-size="13" font-weight="bold" text-anchor="middle" fill="#111">NMEA 0183</text>
  <text x="1030" y="444" font-size="10" text-anchor="middle" fill="#777">talker / listener</text>
  <line x1="936" y1="430" x2="960" y2="430" stroke="#111" stroke-width="1.6"/>
  <text x="966" y="434" font-size="11" fill="#111">OUT+</text>
  <line x1="936" y1="463" x2="960" y2="463" stroke="#111" stroke-width="1.6"/>
  <text x="966" y="467" font-size="11" fill="#111">OUT−</text>
  <line x1="936" y1="555" x2="960" y2="555" stroke="#111" stroke-width="1.6"/>
  <text x="966" y="559" font-size="11" fill="#111">IN+ (A)</text>
  <line x1="936" y1="588" x2="960" y2="588" stroke="#111" stroke-width="1.6"/>
  <text x="966" y="592" font-size="11" fill="#111">IN− (B)</text>
  <use href="#gnd" x="1030" y="608"/>

  <!-- ===================== Wires (green) ===================== -->
  <g stroke="#1a7f37" stroke-width="2" fill="none">
    <!-- CAN_TX: GPIO5 -> CTX -->
    <path d="M314,300 H430 V305 H536"/>
    <!-- CAN_RX: GPIO4 -> CRX -->
    <path d="M314,340 H410 V325 H536"/>
    <!-- CANH/CANL -> connector -->
    <line x1="814" y1="210" x2="936" y2="210"/>
    <line x1="814" y1="250" x2="936" y2="250"/>
    <!-- TX2: GPIO17 -> DI -->
    <path d="M314,430 H455 V525 H536"/>
    <!-- RO -> divider -> RX2 (GPIO16) -->
    <path d="M536,565 H505"/>
    <path d="M465,565 H430 V470 H314"/>
    <!-- divider tap down to R2 -->
    <path d="M505,565 V598"/>
    <!-- MAX490 field side -> NMEA0183 connector -->
    <line x1="814" y1="430" x2="936" y2="430"/>
    <line x1="814" y1="463" x2="936" y2="463"/>
    <line x1="814" y1="555" x2="936" y2="555"/>
    <line x1="814" y1="588" x2="936" y2="588"/>
  </g>

  <!-- junction at RO divider node -->
  <circle cx="505" cy="565" r="3" fill="#1a7f37"/>

  <!-- R1 (series) -->
  <rect x="465" y="558" width="40" height="14" fill="#fff" stroke="#1a7f37" stroke-width="2"/>
  <text x="485" y="552" font-size="11" text-anchor="middle" fill="#1a7f37">R1 1.8k</text>
  <!-- R2 (to GND) -->
  <rect x="498" y="598" width="14" height="34" fill="#fff" stroke="#1a7f37" stroke-width="2"/>
  <text x="516" y="618" font-size="11" fill="#1a7f37">R2 3.3k</text>
  <use href="#gnd" x="505" y="632"/>
  <text x="430" y="500" font-size="10" fill="#cc1111">RO 5 V → 3.3 V divider</text>

  <!-- net labels on CAN/UART wires -->
  <text x="372" y="296" font-size="10" fill="#1a7f37">CAN_TX</text>
  <text x="360" y="356" font-size="10" fill="#1a7f37">CAN_RX</text>
  <text x="372" y="424" font-size="10" fill="#1a7f37">NMEA0183_TX</text>
  <text x="334" y="464" font-size="10" fill="#1a7f37">NMEA0183_RX</text>
  <text x="850" y="204" font-size="10" fill="#1a7f37">CAN_H</text>
  <text x="850" y="244" font-size="10" fill="#1a7f37">CAN_L</text>

  <!-- ===================== Legend / notes ===================== -->
  <rect x="80" y="640" width="700" height="100" rx="4" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="92" y="660" font-size="12" font-weight="bold" fill="#111">Notes</text>
  <text x="92" y="678" font-size="11" fill="#333">1) RO→GPIO16 via R1/R2 divider (MAX490 is 5 V). A 3.3 V module (MAX3490) → power 3V3, wire RO direct.</text>
  <text x="92" y="694" font-size="11" fill="#333">2) NMEA 2000 backbone is already terminated → disable the SN65HVD230 onboard 120 Ω when tapping a backbone.</text>
  <text x="92" y="710" font-size="11" fill="#333">3) Connect only CAN_H / CAN_L / shield-GND from the backbone (do NOT feed its ~12 V to the ESP32).</text>
  <text x="92" y="726" font-size="11" fill="#333">4) Optional: 120 Ω across IN+/IN−, fail-safe bias 680 Ω (A→3V3, B→GND). Common GND across all devices.</text>

  <text x="800" y="700" font-size="11" fill="#cc1111">— 3V3 net</text>
  <text x="800" y="716" font-size="11" fill="#e07b00">— +5V net</text>
  <text x="800" y="732" font-size="11" fill="#1a7f37">— signal net</text>
</svg>
